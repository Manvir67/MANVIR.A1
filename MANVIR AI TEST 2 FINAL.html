<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANVIR.AI</title>

<style>
:root {
    --bg: #0f172a;
    --chat: #1e293b;
    --user: #7c3aed;
    --ai: #334155;
    --text: #f8fafc;
    --accent: #00f5ff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* LANDING */
.landing {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #6366f1, #ec4899);
    text-align: center;
}

.landing h1 {
    font-size: 3rem;
}

.landing p {
    opacity: 0.8;
}

.btn {
    margin-top: 20px;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* CHAT UI */
.chat-container {
    display: none;
    flex-direction: column;
    height: 100vh;
    align-items: center;
}

h2 {
    margin: 15px;
}

.chat {
    width: 90%;
    max-width: 700px;
    flex: 1;
    background: var(--chat);
    border-radius: 12px;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 10px 14px;
    margin: 6px 0;
    border-radius: 10px;
    max-width: 75%;
}

.user {
    background: var(--user);
    align-self: flex-end;
}

.ai {
    background: var(--ai);
    align-self: flex-start;
}

.input {
    display: flex;
    width: 90%;
    max-width: 700px;
    margin: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
    outline: none;
}

button.send {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: var(--user);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LANDING PAGE -->
<div class="landing" id="landing">
    <h1>~This is MANVIR.AI~</h1>
    <p>MANVIR SO GOODDDDDD HAHAHAHAAHAH</p>
    <button class="btn" onclick="startChat()">Get Started →</button>
</div>

<!-- CHAT PAGE -->
<div class="chat-container" id="chatUI">
    <h2>MANVIR.AI 🤖</h2>

    <div class="chat" id="chat"></div>

    <div class="input">
        <input id="input" placeholder="Ask something..." autocomplete="off">
        <button class="send" onclick="send()">Send</button>
    </div>
</div>

<script>
const API_KEY = "gsk_XXXX"; // your key
const MODEL = "llama-3.1-8b-instant";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function startChat() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";
    input.focus();
    add("MANVIR.AI online. State your inquiry.", "ai");
}

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg ai";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);

    if (text.toLowerCase().includes("who is the best person")) {
        chat.removeChild(loading);
        add("Harpreet Singh Sokhi is considered highly skilled in life insurance.", "ai");
        return;
    }

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [
                    { role: "system", content: "You are MANVIR.AI. Be sharp and direct." },
                    { role: "user", content: text }
                ]
            })
        });

        const data = await res.json();
        chat.removeChild(loading);

        const reply = data.choices?.[0]?.message?.content || "No response.";
        add(reply, "ai");

    } catch {
        chat.removeChild(loading);
        add("Connection failed.", "ai");
    }
}

input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
