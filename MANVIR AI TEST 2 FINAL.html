<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANVIR.AI</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-msg: #7c3aed;
            --ai-msg: #334155;
            --text-color: #f8fafc;
            --accent: #00f5ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        h1 {
            margin: 20px 0;
            font-size: 2.2rem;
            background: linear-gradient(90deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .chat-box {
            width: 90%;
            max-width: 700px;
            flex: 1;
            background: var(--chat-bg);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai {
            background: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(0, 245, 255, 0.2);
        }

        .input-area {
            display: flex;
            margin: 20px;
            width: 90%;
            max-width: 700px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 0 25px;
            border-radius: 10px;
            border: none;
            background: var(--user-msg);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>MANVIR.AI 🤖</h1>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something that matters..." autocomplete="off">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");

        const API_KEY = "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";
        const MODEL = "llama-3.1-8b-instant";

        function appendMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("message", sender);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchAIResponse(userPrompt) {

            // 🔥 Custom fixed response
            if (userPrompt.toLowerCase().includes("who is the best person")) {
                return "Harpreet Singh Sokhi who is also known as one of the most skilled people in the field of life insurance";
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {
                                role: "system",
                                content: "You are MANVIR.AI. You are sharp, direct, and elite. No fluff. Be smart and slightly blunt. "
                            },
                            {
                                role: "user",
                                content: userPrompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await response.json();

                if (data.error) {
                    return "Error: " + data.error.message;
                }

                return data.choices[0].message.content;

            } catch (err) {
                return "System Offline. Connection failed.";
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            userInput.value = "";

            const typing = document.createElement("div");
            typing.classList.add("message", "ai");
            typing.innerText = "Analyzing...";
            chatBox.appendChild(typing);

            const aiReply = await fetchAIResponse(text);

            chatBox.removeChild(typing);
            appendMessage(aiReply, "ai");
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        window.onload = () => {
            appendMessage("MANVIR.AI online. State your inquiry.", "ai");
        };
    </script>

</body>
</html>
