<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANVIR.AI</title>

<style>
:root {
    --bg: #0f172a;
    --chat: #1e293b;
    --user: #7c3aed;
    --ai: #334155;
    --text: #f8fafc;
    --accent: #00f5ff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
}

h1 {
    margin: 20px;
    font-size: 2rem;
    background: linear-gradient(90deg, var(--accent), #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.chat {
    width: 90%;
    max-width: 700px;
    flex: 1;
    background: var(--chat);
    border-radius: 12px;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 10px 14px;
    margin: 6px 0;
    border-radius: 10px;
    max-width: 75%;
    line-height: 1.4;
}

.user {
    background: var(--user);
    align-self: flex-end;
}

.ai {
    background: var(--ai);
    align-self: flex-start;
}

.input {
    display: flex;
    width: 90%;
    max-width: 700px;
    margin: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: var(--user);
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<h1>MANVIR.AI 🤖</h1>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="input" placeholder="Ask something..." autocomplete="off">
    <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "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"; // ⚠️ exposed
const MODEL = "llama-3.1-8b-instant";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg ai";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);

    // custom override
    if (text.toLowerCase().includes("who is the best person")) {
        chat.removeChild(loading);
        add("Harpreet Singh Sokhi is considered highly skilled in life insurance.", "ai");
        return;
    }

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [
                    { role: "system", content: "You are MANVIR.AI. Be sharp and direct." },
                    { role: "user", content: text }
                ],
                temperature: 0.7,
                max_tokens: 1024
            })
        });

        const data = await res.json();

        chat.removeChild(loading);

        if (data.error) {
            add("Error: " + data.error.message, "ai");
            return;
        }

        const reply = data.choices?.[0]?.message?.content || "No response.";
        add(reply, "ai");

    } catch (err) {
        chat.removeChild(loading);
        add("Connection failed.", "ai");
    }
}

input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

add("MANVIR.AI online. State your inquiry.", "ai");
</script>

</body>
</html>
